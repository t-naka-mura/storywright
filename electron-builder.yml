appId: com.storywright.app
productName: Storywright
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
mac:
  category: public.app-category.developer-tools
  target: dmg
  identity: null
dmg:
  title: Storywright
  contents:
    - x: 130
      y: 150
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 270
      y: 300
      type: file
      path: build/インストール.command
