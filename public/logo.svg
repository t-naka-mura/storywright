<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b7bd7"/>
      <stop offset="100%" style="stop-color:#4a6bc7"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Flow arrow (story path) -->
  <path d="M140 256 Q140 160, 220 160 L320 160 Q380 160, 380 220"
        fill="none" stroke="#ffffff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <path d="M380 220 L380 300 Q380 360, 320 360 L220 360"
        fill="none" stroke="#ffffff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <!-- Arrowhead -->
  <polygon points="220,330 180,360 220,390" fill="#ffffff" opacity="0.4"/>
  <!-- Record dot (center) -->
  <circle cx="256" cy="256" r="64" fill="#ffffff"/>
  <!-- Play triangle inside dot -->
  <polygon points="240,224 240,288 288,256" fill="url(#bg)"/>
</svg>
