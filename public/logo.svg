  <path d="M256,256 L145,320 L35,139 A250,250 0 0,1 468,124 L256,128 Z" fill="#3d5ab5"/>
  <!-- Right segment (lightest blue) -->
  <path d="M256,256 L256,128 L468,124 A250,250 0 0,1 265,506 L367,320 Z" fill="#9cb8e8"/>
  <!-- Left segment (medium blue) -->
  <path d="M256,256 L367,320 L265,506 A250,250 0 0,1 35,139 L145,320 Z" fill="#5b7bd7"/>
  <!-- White center circle -->
  <circle cx="256" cy="256" r="128" fill="#fff"/>
  <!-- Blue inner circle -->
  <circle cx="256" cy="256" r="104" fill="#4a6bc7"/>
  <!-- Play triangle -->
